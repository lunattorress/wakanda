    <section class="cadastro">
        <div class="container">

            <h2>Tenha acesso aos conteúdos e recursos exclusivos.</h2>
            <p>Crie sua conta para acompanhar de perto.</p>

            <form>
                <input type="text" placeholder="Nome completo">
                <input type="email" placeholder="Seu Email">

                <div class="telefone">
                    <input type="text" class="sp_celphones" placeholder="Digite seu telefone">
                </div>

                <BR></BR>
                <h6>Endereço</h6>

                <div class="linha">
                    <input type="text" placeholder="CEP" class="cep">
                    <input type="text" placeholder="Cidade">
                </div>

                <div class="linha">
                    <input type="text" placeholder="Complemento">
                    <input type="text" placeholder="Estado">
                </div>

                <BR></BR>

                <input type="password" placeholder="Crie uma senha">
                <input type="password" placeholder="Confirme sua senha">

                <button>Criar conta</button>
            </form>
        </div>
    </section>

    </body>

    <script>
        var SPMaskBehavior = function (val) {
        return val.replace(/\D/g, '').length === 11 ? '(00) 00000-0000' : '(00) 0000-00009';
        },
        spOptions = {
        onKeyPress: function(val, e, field, options) {
            field.mask(SPMaskBehavior.apply({}, arguments), options);
            }
        };

        $('.sp_celphones').mask(SPMaskBehavior, spOptions);
        $('.cep').mask('00000-000');

    </script>
